name: Daily surf forecast pull
on:
  schedule:
    - cron: '27 5 * * *'
    - cron: '47 13 * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4
      - run: python scripts/fetch.py
      - name: Commit
        run: |
          git config user.name "forecast-bot"
          git config user.email "forecast-bot@users.noreply.github.com"
          git add today.json archive/
          git commit -m "Forecast $(date -u +%Y-%m-%d)" || exit 0
          git push
